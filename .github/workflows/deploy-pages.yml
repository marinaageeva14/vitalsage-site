name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Inject PageSpeed API key from repository secret
        env:
          PSI_API_KEY: ${{ secrets.PSI_API_KEY }}
        run: |
          cat > config.js <<EOF
          // Generated at deploy time — do not commit real keys.
          window.VITALSAGE_CONFIG = { psiKey: '${PSI_API_KEY}' };
          EOF

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
